<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практика по формамt</title>
    
</head>
<body>
    <form>
        <fieldset>
            <legend>Ваши личные данные </legend>
            <label> Ваше имя
            <input type="text" required placeholder="имя" name="name" />
            </label>
            <label>Ваш возраст
            <input type="number" required placeholder=" возраст" name="date" />
            </label>
            <label>Ваш номер телефона
            <input type="tel" inputmode="tel" required placeholder="номер телефона" name="tel" />
            </label>
            <label>Ваша почта
            <input type="email" inputmode="email" required placeholder="почта" name="email" />
            </label>
            <label>Сообщение
            <input type="text" placeholder="сообщение" name="text" />
            </label>
            <label>
            <input type="checkbox" />
            Я принимаю правила
            </label>
            <button type="text">Отправить</button>
        </fieldset>
    </form>
</body>
</html>
